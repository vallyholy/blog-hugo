{{ define "main" }}
<article class="post">
    <h1>{{ .Title }}</h1>
    <div class="post-meta">{{ .Date.Format "2006-01-02" }}{{ with .Params.categories }} · {{ . }}{{ end }}</div>
    <div class="content">
        {{ .Content }}
    </div>
    <div class="tags">
        {{ with .Params.tags }}
            {{ range . }}<span class="tag">{{ . }}</span>{{ end }}
        {{ end }}
    </div>
</article>
{{ end }}
