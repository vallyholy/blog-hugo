<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ block "title" . }}{{ .Site.Title }}{{ end }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; }
        header { border-bottom: 2px solid #333; padding: 20px 0; margin-bottom: 30px; }
        header h1 a { text-decoration: none; color: #333; }
        nav { margin-top: 10px; }
        nav a { margin-right: 20px; color: #666; text-decoration: none; }
        nav a:hover { color: #000; }
        .post { margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .post h2 { margin-bottom: 10px; }
        .post h2 a { color: #333; text-decoration: none; }
        .post h2 a:hover { color: #007bff; }
        .post-meta { color: #888; font-size: 0.9em; margin-bottom: 10px; }
        .content { margin-top: 20px; }
        .content h2 { margin: 20px 0 10px; }
        .content p { margin-bottom: 15px; }
        .content pre { background: #f5f5f5; padding: 15px; border-radius: 5px; overflow-x: auto; }
        .content code { background: #f5f5f5; padding: 2px 5px; border-radius: 3px; }
        footer { margin-top: 50px; padding-top: 20px; border-top: 1px solid #eee; color: #888; text-align: center; }
        .tags { margin-top: 10px; }
        .tag { display: inline-block; background: #e9ecef; padding: 3px 10px; border-radius: 15px; margin-right: 5px; font-size: 0.85em; color: #666; text-decoration: none; }
        .home-title { font-size: 2.5em; margin-bottom: 10px; }
        .home-subtitle { color: #666; margin-bottom: 20px; }
    </style>
</head>
<body>
    <header>
        <h1><a href="{{ .Site.BaseURL }}">{{ .Site.Title }}</a></h1>
        <nav>
            <a href="{{ .Site.BaseURL }}">首页</a>
            <a href="{{ .Site.BaseURL }}categories/">分类</a>
            <a href="{{ .Site.BaseURL }}tags/">标签</a>
            <a href="{{ .Site.BaseURL }}about/">关于</a>
        </nav>
    </header>
    <main>
        {{ block "main" . }}{{ end }}
    </main>
    <footer>
        <p>&copy; {{ now.Year }} {{ .Site.Title }}. All rights reserved.</p>
    </footer>
</body>
</html>
